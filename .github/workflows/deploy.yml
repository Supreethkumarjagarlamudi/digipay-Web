# ═══════════════════════════════════════════════════════════════════════════════
# .github/workflows/deploy.yml
# Digipay — Build & Deploy to GitHub Pages
#
# Triggers: Every push to main branch
# What it does:
#   1. npm ci + npm run build  (produces dist/)
#   2. Uploads dist/ as GitHub Pages artifact
#   3. Deploys to https://harishbalaji826-ops.github.io/Digipay-Web/
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ─── JOB 1: Build ──────────────────────────────────────────────────────────
  build:
    name: "🔨 Build Vite App"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Set up Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔨 Build production bundle"
        run: npm run build
        env:
          # Pass your Railway backend URL if needed at build time
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

      - name: "🔍 Verify dist/ was created"
        run: |
          echo "── dist/ contents ──────────────────────"
          ls -lh dist/
          echo "── dist/index.html ─────────────────────"
          cat dist/index.html

      - name: "⚙️ Configure GitHub Pages"
        uses: actions/configure-pages@v4

      - name: "📤 Upload dist/ as Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ─── JOB 2: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: "🚀 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4

      - name: "✅ Deployment complete"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Digipay deployed successfully!"
          echo "  🌐  URL: ${{ steps.deployment.outputs.page_url }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
